name: Verify New Devices
on:
  push:
    branches: [ "main" ]
  schedule:
    # רץ כל 30 דקות (לפי שעון UTC)
    - cron: '*/30 * * * *'
  workflow_dispatch: # מאפשר לך להריץ ידנית כשבא לך
  
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests
      - name: Run sync script
        env:
          BASE44_MASTER_KEY: ${{ secrets.BASE44_MASTER_KEY }}
        run: python sync_devices.py
